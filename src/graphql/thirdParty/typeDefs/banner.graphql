# Banner — raw recommendation campaign data (not product-enriched)
# Used for campaigns that return metadata (images, categories) instead of product IDs

type BannerCategoryItem {
    banner_url: String
    banner_app: String
    category: String
    itemId: String
}

type SubCategoryBannerItem {
    firstCategory: String
    secondCategory: String
    subCategoryImage: String
    itemId: String
}

type SyneriseBannerData {
    data: [BannerCategoryItem!]
}

type SyneriseBannerSubCategoryData {
    data: [SubCategoryBannerItem!]
}

type SyneriseBannerResult {
    getCategory(
        clientUUID: String!
        campaignId: String!
    ): SyneriseBannerData

    getSubCategories(
        clientUUID: String!
        campaignId: String!
    ): SyneriseBannerSubCategoryData
}
