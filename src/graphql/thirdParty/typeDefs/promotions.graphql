# Promotion – get-for-client (with token)
type PromotionItem {
  title: String
  name: String
  code: String
  headline: String
  discountValue: Float
  discountType: String
  images: [PromotionImage]
  params: JSONObject
}

type PromotionImage {
  url: String
  type: String
}

type SynerisePromotionsData {
  data: [PromotionItem!]
}

extend type Query {
  synerisePromotions(
    basicAuth: String!
    clientUUID: String!
    limit: Int
  ): SynerisePromotionsData!
}