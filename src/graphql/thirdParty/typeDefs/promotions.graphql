# Promotion – get-for-client (with token)
type PromotionItem {
    title: String
    name: String
    code: String
    headline: String
    discountValue: Float
    discountType: String
    status: String
    images: [PromotionImage]
    params: JSONObject
}

type PromotionImage {
    url: String
    type: String
}

type SynerisePromotionsData {
    data: [PromotionItem!]
}

type SynerisePromotionsResult {
    getForClient(
        clientUUID: String!
        limit: Int
    ): SynerisePromotionsData
}

extend type Mutation {
    synerisePromotionActivate(
        apiKey: String!
        clientUUID: String!
        code: String!
        pointsToUse: Int
    ): Boolean
}
